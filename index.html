<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUSUCAKSIN</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
}

.marquee{
    position:absolute;
    white-space:nowrap;
    font-family:Arial, Helvetica, sans-serif;
    font-weight:900;
    font-size:clamp(28px,8vw,90px);
    animation:
        move 10s linear infinite,
        rainbow 8s linear infinite;
    text-shadow:
        0 0 8px currentColor,
        0 0 20px currentColor,
        0 0 40px currentColor;
}

@keyframes move{
    from{
        transform:translateX(100vw);
    }
    to{
        transform:translateX(-120%);
    }
}

@keyframes rainbow{
    0%{color:#ff0000;}
    16%{color:#ff8800;}
    33%{color:#ffff00;}
    50%{color:#00ff00;}
    66%{color:#00ccff;}
    83%{color:#7a00ff;}
    100%{color:#ff0000;}
}
</style>
</head>
<body>

<div class="marquee">
🚨 KESSSSSSSSS 🚨
</div>

</body>
</html>
