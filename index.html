<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUSUCAKSIN</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Arial, Helvetica, sans-serif;
}

.marquee{
    position:absolute;
    white-space:nowrap;
    font-size:90px;
    font-weight:900;
    color:#ff0000;
    text-shadow:
        0 0 10px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #ff0000,
        0 0 80px #ff0000,
        0 0 120px #ff0000;

    animation:
        kaydir 8s linear infinite,
        yanipSon 0.5s infinite;
}

@keyframes kaydir{
    from{
        transform:translateX(110vw);
    }
    to{
        transform:translateX(-120%);
    }
}

@keyframes yanipSon{
    0%,100%{
        opacity:1;
    }
    50%{
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="marquee">
🚨 SUSUCAKSIN ALMİNA ADAM OL 🚨
</div>

</body>
</html>
