<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sana ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff4d6d,#ff85a2,#ffb3c6,#ffd6e0);
background-size:400% 400%;
animation:bg 12s ease infinite;
}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
.container{text-align:center;z-index:10;padding:20px}
h1{
font-size:clamp(42px,8vw,90px);
color:#fff;
text-shadow:0 0 15px #fff,0 0 35px #ff0080;
animation:pulse 2s infinite;
}
#love{
margin-top:30px;
font-size:clamp(24px,5vw,42px);
font-weight:bold;
color:#fff;
text-shadow:0 0 10px #fff;
min-height:70px;
transition:.4s;
}
@keyframes pulse{50%{transform:scale(1.08)}}
.star{
position:absolute;
width:3px;height:3px;
background:#fff;
border-radius:50%;
animation:blink 2s infinite;
}
@keyframes blink{50%{opacity:.2;transform:scale(2)}}
.heart{
position:absolute;
bottom:-40px;
width:22px;
height:22px;
background:var(--c);
transform:rotate(-45deg);
animation:fly linear forwards;
}
.heart:before,.heart:after{
content:"";
position:absolute;
width:22px;
height:22px;
background:var(--c);
border-radius:50%;
}
.heart:before{top:-11px;left:0}
.heart:after{left:11px;top:0}
@keyframes fly{
0%{transform:translateY(0) rotate(-45deg) scale(.8);opacity:1}
100%{transform:translateY(-120vh) rotate(315deg) scale(1.5);opacity:0}
}
</style>
</head>
<body>
<div class="container">
<h1>❤️ SENİ ÇOK SEVİYORUM ❤️</h1>
<div id="love"></div>
</div>
<script>
const words=[
"❤️ Seni Seviyorum ❤️",
"❤️ Aşkım ❤️",
"❤️ Balım ❤️",
"❤️ Bebeğim ❤️",
"❤️ Canım ❤️",
"❤️ Hayatım ❤️",
"❤️ Bir Tanem ❤️",
"❤️ Güzelim ❤️",
"❤️ Kalbimin Sahibi ❤️",
"❤️ Her Şeyimsin ❤️",
"❤️ Sen Benim Dünyamsın ❤️",
"❤️ İyi ki Varsın ❤️",
"❤️ En Güzel Hikâyem Sensin ❤️",
"❤️ Kalbim Hep Seninle ❤️",
"❤️ Sonsuza Kadar Sen ❤️",
"❤️ İyi ki Benimsin ❤️",
"❤️ I Love You ❤️"
];
let idx=0;
const love=document.getElementById("love");
function nextText(){
love.textContent=words[idx];
idx=(idx+1)%words.length;
}
nextText();
setInterval(nextText,1800);

const colors=["#ff1744","#ff4081","#ff9800","#ffd600","#4caf50","#00bcd4","#2979ff","#7c4dff","#e040fb"];

function heart(){
const h=document.createElement("div");
h.className="heart";
h.style.setProperty("--c",colors[Math.floor(Math.random()*colors.length)]);
h.style.left=Math.random()*100+"vw";
const s=0.7+Math.random()*1;
h.style.transform=`rotate(-45deg) scale(${s})`;
h.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
}
setInterval(heart,70);

for(let i=0;i<120;i++){
const s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDelay=Math.random()*2+"s";
document.body.appendChild(s);
}
</script>
</body>
</html>
