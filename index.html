<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sana ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff4d6d,#ff85a2,#ffb3c6,#ffd6e0);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
z-index:10;
padding:20px;
}

h1{
font-size:clamp(42px,8vw,90px);
color:#fff;
text-shadow:0 0 15px #fff,0 0 35px #ff0080;
animation:pulse 2s infinite;
}

#love{
margin-top:35px;
font-size:clamp(24px,5vw,42px);
font-weight:bold;
color:#fff;
text-shadow:0 0 10px #fff;
min-height:70px;
animation:fade .5s;
}

@keyframes pulse{
50%{transform:scale(1.08);}
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:blink 2s infinite;
}

@keyframes blink{
50%{
opacity:.2;
transform:scale(2);
}
}

.heart{
position:absolute;
bottom:-40px;
font-size:28px;
animation:fly linear forwards;
pointer-events:none;
}

@keyframes fly{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(-120vh) rotate(720deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>❤️ SENİ ÇOK SEVİYORUM ❤️</h1>

<div id="love"></div>

</div>

<script>

const words=[
"❤️ Seni Seviyorum ❤️",
"❤️ Aşkım ❤️",
"❤️ Balım ❤️",
"❤️ Bebeğim ❤️",
"❤️ Canım ❤️",
"❤️ Hayatım ❤️",
"❤️ Bir Tanem ❤️",
"❤️ Güzelim ❤️",
"❤️ Kalbimin Sahibi ❤️",
"❤️ Her Şeyimsin ❤️",
"❤️ Sen Benim Dünyamsın ❤️",
"❤️ İyi ki Varsın ❤️",
"❤️ En Güzel Hikâyem Sensin ❤️",
"❤️ Kalbim Hep Seninle ❤️",
"❤️ Sonsuza Kadar Sen ❤️",
"❤️ İyi ki Benimsin ❤️",
  "❤️ I Love You ❤️"
];

let i=0;

function changeText(){
document.getElementById("love").textContent=words[i];
i=(i+1)%words.length;
}

changeText();
setInterval(changeText,1800);

const colors=[
"#ff1744","#ff4081","#ff80ab",
"#f50057","#ff6f00","#ffd600",
"#76ff03","#00e5ff","#2979ff","#d500f9"
];

function createHeart(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.color=colors[Math.floor(Math.random()*colors.length)];

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(24+Math.random()*26)+"px";

h.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),8000);

}

setInterval(createHeart,60);

for(let i=0;i<120;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(s);

}

</script>

</body>
</html>
