<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUSACAK MISIN?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

#container{
    text-align:center;
}

h1{
    font-size:clamp(38px,8vw,80px);
    margin-bottom:30px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    position:relative;
}

button{
    padding:16px 34px;
    font-size:24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

#yes{
    background:#16a34a;
    color:#fff;
}

#no{
    background:#dc2626;
    color:#fff;
    position:relative;
}

#result{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:clamp(40px,8vw,80px);
    font-weight:bold;
}

.firework{
    position:absolute;
    width:8px;
    height:8px;
    border-radius:50%;
    animation:explode 1s forwards;
}

@keyframes explode{
    from{
        transform:translate(0,0);
        opacity:1;
    }
    to{
        transform:translate(var(--x),var(--y));
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="container">

<h1>SUSACAK MISIN?</h1>

<div class="buttons">
    <button id="yes">SUSUCAM</button>
    <button id="no">SUSMUYCAM</button>
</div>

</div>

<div id="result">
AFERİN ADAM OL
</div>

<script>

const no=document.getElementById("no");

function kac(){

    const x=Math.random()*(window.innerWidth-180);
    const y=Math.random()*(window.innerHeight-80);

    no.style.position="fixed";
    no.style.left=x+"px";
    no.style.top=y+"px";

}

no.addEventListener("mouseenter",kac);
no.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    kac();
});

document.getElementById("yes").onclick=()=>{

    document.getElementById("container").style.display="none";

    const result=document.getElementById("result");
    result.style.display="flex";

    for(let i=0;i<180;i++){

        const d=document.createElement("div");

        d.className="firework";

        d.style.background=`hsl(${Math.random()*360},100%,60%)`;

        d.style.left=window.innerWidth/2+"px";
        d.style.top=window.innerHeight/2+"px";

        d.style.setProperty("--x",(Math.random()*900-450)+"px");
        d.style.setProperty("--y",(Math.random()*900-450)+"px");

        document.body.appendChild(d);

        setTimeout(()=>d.remove(),1000);

    }

};

</script>

</body>
</html>
